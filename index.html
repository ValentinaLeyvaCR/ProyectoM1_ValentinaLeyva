<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <!-- conexion al css -->
    <link rel="stylesheet" href="./CSS/styles.css">

    <title>Proyecto M1 - Arcobaleno studio</title>
</head>
<body>
    <header>
        <nav class="nav">
            <span class="nav-logo">Arcobaleno studio</span>
            <ul class="nav-links">
                <li><a class="nav-link" href="#generador">Generador</a></li>
            </ul>
        </nav>
    </header>
<!-- Navegacion principal de la pagina -->
<!-- contenido principal del generador -->
    <main>
        <section id="Generador">
            <h2>Generador de paletas</h2>
<!--Boton de generacion de paletas-->
         <div class="controles">
          <button class="boton boton-primario" id="generar">Generar paleta</button> <!--se crea el boton generar paleta con id para logica js -->
          
          <div class="controles-campo"> <!--esto se encarga de generar un desplegable para seleccionar la cantidad de colores que se quieren generar--> 
            <label class="controles-label" for="cantidad">Cantidad de colores</label>
            <select class="select" id="cantidad">
                <option value="6">6 colores</option>
                <option value="8">8 colores</option>
                <option value="9">9 colores</option>
            </select>
           </div> 

         </div>

          <section class="galeria" id="galeria"></section>   
        </section>
    </main>

    <footer>
        <p>Arcobaleno Studio &copy; 2026</p>
    </footer>

    <script src="./JS/index.js"></script> <!--esto conecta el html con js, y se pone al final para que cargue primero el html y luego si se ejecute el js -->
</body>
</html>
