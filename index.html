<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <!-- conexion al css -->
    <link rel="stylesheet" href="./CSS/styles.css">
    <title>Proyecto M1 - Arcobaleno studio</title>
</head>
<body>
    <header>
        <nav class="nav">
            <span class="nav-logo">Arcobaleno studio</span>
            <ul class="nav-links">
                <li><a class="nav-link" href="#generador">Inicio</a></li>
                <li><a class="nav-link" href="#guardadas">Generador de colores</a></li>
            </ul>
        </nav>
    </header>
<!-- Navegacion principal de la pagina -->
<!-- contenido principal del generador -->
    <main>
        <section id="Generador">
            <h2>Generador de paletas</h2>
            
          <section class="galeria">
            <article class="swatch" tabindex="0">   <!-- "swatch" cuando se muestra el color y la informacion abajo -->
              <div class="swatch-color"></div>  <!--este muestra solo el color de la tarjeta-->
              <div class="swatch-info">  <!--este muestra la informacion de la tarjeta-->
                 <p class="swatch-nombre">Primario</p>  <!--este muestra el nombre del color-->
                 <p class="swatch-codigo">#ec3a8b . hsl(330,85%,55%)</p> <!--aqui el codigo del color-->
              </div> 
            </article> 

            <article class="swatch" tabindex="0">   <!-- "swatch" cuando se muestra el color y la informacion abajo -->
              <div class="swatch-color swatch-color-claro"></div>  <!--este muestra solo el color de la tarjeta en este caso claro-->
              <div class="swatch-info"> <!--este muestra la informacion de la tarjeta-->
                 <p class="swatch-nombre">Primario claro</p>  <!--este muestra el nombre del color-->
                 <p class="swatch-codigo">#b3196a . hsl(330,75%,40%)</p> <!--aqui el codigo del color-->
              </div> 
            </article> 
            
           <article class="swatch" tabindex="0">   <!-- "swatch" cuando se muestra el color y la informacion abajo -->
              <div class="swatch-color swatch-color-oscuro"></div>  <!--este muestra solo el color de la tarjeta en este caso oscuro-->
              <div class="swatch-info">  <!--este muestra la informacion de la tarjeta-->
                 <p class="swatch-nombre">Primario oscuro</p>  <!--este muestra el nombre del color-->
                 <p class="swatch-codigo">#0bd4da . hsl(190,90%,45%)</p> <!--aqui el codigo del color-->
              </div> 
            </article> 

            <article class="swatch" tabindex="0">   <!-- "swatch" cuando se muestra el color y la informacion abajo -->
              <div class="swatch-color swatch-color-acento"></div>  <!--este muestra solo el color de la tarjeta en este caso oscuro-->
              <div class="swatch-info">  <!--este muestra la informacion de la tarjeta-->
                 <p class="swatch-nombre">Acento</p>  <!--este muestra el nombre del color-->
                 <p class="swatch-codigo">#0bd4da . hsl(190,90%,45%)</p> <!--aqui el codigo del color-->
              </div> 
            </article> 
          </section>   

        </section>
    </main>

    <footer>
        <p>Arcobaleno Studio &copy; 2026</p>
    </footer>
</body>
</html>
